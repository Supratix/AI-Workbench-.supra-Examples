<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">AI Workbench .supra Architecture</title>
  <desc id="desc">From package files to reviewable AI workflow execution</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#102c46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#163a5a"/>
      <stop offset="100%" stop-color="#225e7b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7bdff2"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="80" r="110" fill="#7bdff2" opacity="0.12"/>
  <circle cx="80" cy="610" r="120" fill="#c3f584" opacity="0.09"/>
  <text x="40" y="58" fill="#ffffff" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">AI Workbench .supra Architecture</text>
  <text x="40" y="91" fill="#b8d8ea" font-size="16" font-family="Inter, Arial, sans-serif">From package files to reviewable AI workflow execution</text>
  <line x1="310" y1="210" x2="360" y2="210" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="610" y1="210" x2="660" y2="210" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="785" y1="270" x2="785" y2="380" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="610" y1="440" x2="660" y2="440" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="910" y1="440" x2="960" y2="440" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="185" y1="270" x2="430" y2="380" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="60" y="150" width="250" height="120" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="80" y="184" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">.supra packages</text>
    <text x="80" y="213" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">JSON package definitions</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="150" width="250" height="120" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="380" y="184" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Schemas + CI</text>
    <text x="380" y="213" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Validate structure and contracts</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="150" width="250" height="120" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="680" y="184" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">AI Workbench</text>
    <text x="680" y="213" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Import columns and workflows</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="380" width="250" height="120" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="380" y="414" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Generated docs</text>
    <text x="380" y="443" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Bilingual package references</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="380" width="250" height="120" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="680" y="414" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Manual review</text>
    <text x="680" y="443" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Human gates and evidence gaps</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="380" width="180" height="120" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="980" y="414" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Outputs</text>
    <text x="980" y="443" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">JSON-ready briefs</text>
  </g>
</svg>
