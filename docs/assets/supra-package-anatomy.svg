<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">.supra Package Anatomy</title>
  <desc id="desc">The portable sections used by AI Workbench examples</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#102c46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#163a5a"/>
      <stop offset="100%" stop-color="#225e7b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7bdff2"/>
    </marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="80" r="110" fill="#7bdff2" opacity="0.12"/>
  <circle cx="80" cy="580" r="120" fill="#c3f584" opacity="0.09"/>
  <text x="40" y="58" fill="#ffffff" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">.supra Package Anatomy</text>
  <text x="40" y="91" fill="#b8d8ea" font-size="16" font-family="Inter, Arial, sans-serif">The portable sections used by AI Workbench examples</text>
  <line x1="360" y1="195" x2="460" y2="195" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="740" y1="195" x2="840" y2="195" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="600" y1="250" x2="430" y2="390" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="840" y1="250" x2="800" y2="390" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="280" height="110" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="100" y="174" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">metadata</text>
    <text x="100" y="203" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">vendor, versions, starter rows</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="460" y="140" width="280" height="110" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="480" y="174" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">columns</text>
    <text x="480" y="203" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">manual, AI tool, shortcut steps</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="840" y="140" width="280" height="110" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="860" y="174" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">workflows</text>
    <text x="860" y="203" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">ordered workflow pipe steps</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="250" y="390" width="300" height="110" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="270" y="424" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">output contracts</text>
    <text x="270" y="453" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">required fields + quality gates</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="650" y="390" width="300" height="110" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="670" y="424" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">main_workbench</text>
    <text x="670" y="453" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">portable workbench mirror</text>
  </g>
</svg>
