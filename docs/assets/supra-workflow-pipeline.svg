<rect x="114" y="404" width="970" height="54" rx="27" fill="rgb(111 218 238 / 0.10)" stroke="rgb(111 218 238 / 0.35)" stroke-width="2"/>
<text x="170" y="439" fill="rgb(245 250 255)" font-size="21" font-family="Arial, Helvetica, sans-serif" font-weight="700">Every executable step returns JSON, marks evidence gaps, and stays in manual-review mode.</text>
