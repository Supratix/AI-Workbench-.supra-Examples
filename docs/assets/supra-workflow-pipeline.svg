<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">.supra Workflow Pipeline</title>
  <desc id="desc">A default four-step package pattern for SME examples</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#102c46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#163a5a"/>
      <stop offset="100%" stop-color="#225e7b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7bdff2"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="80" r="110" fill="#7bdff2" opacity="0.12"/>
  <circle cx="80" cy="450" r="120" fill="#c3f584" opacity="0.09"/>
  <text x="40" y="58" fill="#ffffff" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">.supra Workflow Pipeline</text>
  <text x="40" y="91" fill="#b8d8ea" font-size="16" font-family="Inter, Arial, sans-serif">A default four-step package pattern for SME examples</text>
  <line x1="290" y1="248" x2="350" y2="248" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="570" y1="248" x2="630" y2="248" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="850" y1="248" x2="910" y2="248" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="70" y="190" width="220" height="115" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="90" y="224" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">1. Intake</text>
    <text x="90" y="253" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Manual user or file context</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="350" y="190" width="220" height="115" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="370" y="224" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">2. Signal map</text>
    <text x="370" y="253" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Facts, constraints, risks</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="630" y="190" width="220" height="115" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="650" y="224" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">3. Decision plan</text>
    <text x="650" y="253" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Owners, actions, metrics</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="910" y="190" width="220" height="115" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="930" y="224" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">4. Execution brief</text>
    <text x="930" y="253" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Reviewable final output</text>
  </g>
</svg>
