<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Workbench .supra Examples</title>
  <desc id="desc">Ready-to-publish GitHub repo with packages, docs, schemas, CI, and diagrams</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#102c46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#163a5a"/>
      <stop offset="100%" stop-color="#225e7b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7bdff2"/>
    </marker>
  </defs>
  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <circle cx="1110" cy="80" r="110" fill="#7bdff2" opacity="0.12"/>
  <circle cx="80" cy="560" r="120" fill="#c3f584" opacity="0.09"/>
  <text x="40" y="58" fill="#ffffff" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">AI Workbench .supra Examples</text>
  <text x="40" y="91" fill="#b8d8ea" font-size="16" font-family="Inter, Arial, sans-serif">Ready-to-publish GitHub repo with packages, docs, schemas, CI, and diagrams</text>
  <line x1="320" y1="278" x2="360" y2="278" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="600" y1="278" x2="640" y2="278" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <line x1="880" y1="278" x2="920" y2="278" stroke="#7bdff2" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="80" y="210" width="240" height="135" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="100" y="244" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">43 packages</text>
    <text x="100" y="273" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">SME, analytics, VUCA, tender</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="210" width="240" height="135" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="380" y="244" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Bilingual docs</text>
    <text x="380" y="273" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">English + German references</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="210" width="240" height="135" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="660" y="244" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Validation CI</text>
    <text x="660" y="273" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">Schemas and package checks</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="210" width="200" height="135" rx="18" fill="url(#card)" stroke="#7bdff2" stroke-opacity="0.35"/>
    <text x="940" y="244" fill="#ffffff" font-size="17" font-family="Inter, Arial, sans-serif" font-weight="700">Assets</text>
    <text x="940" y="273" fill="#d9eef7" font-size="13" font-family="Inter, Arial, sans-serif">README-ready diagrams</text>
  </g>
</svg>
