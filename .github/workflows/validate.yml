name: Validate .supra examples

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate .supra packages
        run: python scripts/validate_supra.py .
      - name: Check generated docs are present
        run: python scripts/generate_docs.py . --check
